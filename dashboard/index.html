<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Medallion Fund Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e29;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #7a7f94;
    --accent: #5b8cf5;
    --accent2: #2ecc8f;
    --accent3: #f5a623;
    --accent4: #e05c5c;
    --accent5: #a78bfa;
    --accent6: #38bdf8;
    --danger: #e05c5c;
    --success: #2ecc8f;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  code, .mono { font-family: 'DM Mono', monospace; }

  /* ── Layout ── */
  .top-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 56px;
  }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .top-actions { display: flex; align-items: center; gap: 12px; }
  .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: rgba(91,140,245,0.15); color: var(--accent);
    border: 1px solid rgba(91,140,245,0.25); font-family: 'DM Mono', monospace;
  }

  .container { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 56px); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  .sidebar-section h4 {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
  }
  .category-group { margin-bottom: 12px; }
  .category-label {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; font-weight: 600; color: var(--muted);
    padding: 6px 8px; cursor: pointer; border-radius: 6px;
    transition: background .15s;
  }
  .category-label:hover { background: var(--bg3); color: var(--text); }
  .category-label .chevron { font-size: 10px; transition: transform .2s; }
  .category-label.open .chevron { transform: rotate(90deg); }
  .fund-list { display: none; padding-left: 8px; }
  .fund-list.open { display: block; }
  .fund-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 8px; border-radius: 6px; cursor: pointer;
    transition: background .12s; font-size: 12px; color: var(--muted);
  }
  .fund-item:hover { background: var(--bg3); color: var(--text); }
  .fund-item.selected { background: rgba(91,140,245,0.12); color: var(--accent); }
  .fund-item input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
  .fund-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .index-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 6px; cursor: pointer;
    transition: background .12s; font-size: 12px; color: var(--muted);
  }
  .index-item:hover { background: var(--bg3); color: var(--text); }
  .index-item.selected { background: rgba(46,204,143,0.1); color: var(--accent2); }
  .index-item input[type=checkbox] { accent-color: var(--accent2); width: 13px; height: 13px; }

  .sidebar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-sm {
    font-size: 11px; font-family: 'Sora', sans-serif;
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2);
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all .15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Main ── */
  .main { padding: 24px 28px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }

  /* ── View Tabs ── */
  .view-tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius-sm); padding: 4px; width: fit-content; }
  .tab-btn {
    font-size: 12px; font-family: 'Sora', sans-serif; font-weight: 600;
    padding: 7px 18px; border-radius: 6px; border: none;
    background: transparent; color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .tab-btn.active { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }

  /* ── Stat Cards ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .stat-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
  .stat-card .value { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .pos { color: var(--success); }
  .neg { color: var(--danger); }

  /* ── Chart Cards ── */
  .chart-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
  }
  .chart-card h3 {
    font-size: 13px; font-weight: 600; color: var(--text);
    margin-bottom: 4px; letter-spacing: -.2px;
  }
  .chart-card .chart-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .chart-wrapper { position: relative; width: 100%; }

  /* Controls */
  .chart-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .ctrl-btn {
    font-size: 11px; font-family: 'Sora', sans-serif; font-weight: 600;
    padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2);
    background: transparent; color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .ctrl-btn.active { background: rgba(91,140,245,0.15); border-color: rgba(91,140,245,0.4); color: var(--accent); }

  .custom-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-line { width: 18px; height: 2px; flex-shrink: 0; }

  /* ── Scatter ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .8px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 10px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; }
  td.fund-name { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 12px; }

  /* ── Empty / Loading ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 340px; gap: 12px; color: var(--muted); text-align: center;
  }
  .empty-icon { font-size: 36px; opacity: .3; }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); }
  .empty-state p { font-size: 13px; max-width: 320px; line-height: 1.6; }

  /* ── Range picker ── */
  .range-picker { display: flex; align-items: center; gap: 8px; }
  .range-picker label { font-size: 11px; color: var(--muted); }
  .range-picker input[type=date] {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; font-family: 'DM Mono', monospace;
  }
  .range-picker input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 18px;
    font-size: 13px; color: var(--text);
    transform: translateY(80px); opacity: 0; transition: all .25s;
    max-width: 320px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-color: var(--danger); color: var(--danger); }
  #toast.ok { border-color: var(--success); color: var(--success); }

  /* ── Section header ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 300px; }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">Medallion <span>Fund</span></div>
  <div class="top-actions">
    <span class="badge" id="data-status">Waiting for workbook</span>
  </div>
</div>

<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <h4>Mutual Funds</h4>
      <div id="fund-list">
        <div class="empty-state" style="min-height:80px;font-size:12px;">
          <p style="font-size:12px;">Waiting for workbook data</p>
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <h4>Benchmark Indices</h4>
      <div id="index-list">
        <div style="color:var(--muted);font-size:12px;padding:8px;">—</div>
      </div>
    </div>
    <div class="sidebar-section">
      <h4>Actions</h4>
      <div class="sidebar-actions">
        <button class="btn-sm" onclick="selectAll()">Select All</button>
        <button class="btn-sm" onclick="clearAll()">Clear</button>
        <button class="btn-sm" onclick="selectCategory(activeCategory)">Cat. Only</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-panel">
    <div class="empty-state" id="landing-empty">
      <div class="empty-icon">📊</div>
      <h3>Loading workbook</h3>
      <p>The dashboard reads data directly from <code>./NAV_Data.xlsx</code> and refreshes automatically when the file changes.</p>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let DB = { funds: {}, indices: {}, riskFree: {}, meta: {}, riskPeriods: [] };
let selectedFunds = new Set();
let selectedIndices = new Set();
let currentView = 'nav';
let activeCategory = null;
let riskPeriod = null;
const WORKBOOK_PATH = './NAV_Data.xlsx';
const AUTO_REFRESH_MS = 30000;
const COLORS = [
  '#5b8cf5','#2ecc8f','#f5a623','#e05c5c','#a78bfa','#38bdf8',
  '#f97316','#ec4899','#84cc16','#14b8a6','#f43f5e','#8b5cf6'
];
let fundColorMap = {};
let workbookSignature = null;
let lastLoadError = null;
let dateAdapterReady = false;
let refreshTimerId = null;

// ─── Workbook Load ───────────────────────────────────────────────────────────
async function loadWorkbook(showToast = false) {
  try {
    if (!dateAdapterReady) return;

    const res = await fetch(`${WORKBOOK_PATH}?t=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const buf = await res.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let hash = 0;
    for (let i = 0; i < bytes.length; i++) hash = (hash * 31 + bytes[i]) >>> 0;
    const sig = `${bytes.length}:${hash}`;
    if (sig === workbookSignature) return;

    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    parseWorkbook(wb);
    workbookSignature = sig;
    lastLoadError = null;
    if (showToast) toast('Workbook loaded', 'ok');
  } catch (err) {
    document.getElementById('data-status').textContent = 'Workbook unavailable';
    renderWorkbookError(err);
    if (lastLoadError !== err.message) {
      toast('Error loading workbook: ' + err.message, 'error');
      lastLoadError = err.message;
    }
  }
}

function renderWorkbookError(err) {
  const fl = document.getElementById('fund-list');
  fl.innerHTML = `<div class="empty-state" style="min-height:80px;font-size:12px;">
    <p style="font-size:12px;">Could not read <code>${WORKBOOK_PATH}</code></p>
  </div>`;

  const main = document.getElementById('main-panel');
  main.innerHTML = `<div class="empty-state" id="landing-empty">
    <div class="empty-icon">⚠️</div>
    <h3>Workbook not available</h3>
    <p>Make sure <code>${WORKBOOK_PATH}</code> is served alongside this page. Browser error: ${err.message}</p>
  </div>`;
}

function normalizeRow(row) {
  const normalized = {};
  Object.entries(row).forEach(([key, value]) => {
    const cleanKey = String(key || '').trim();
    normalized[cleanKey] = typeof value === 'string' ? value.trim() : value;
  });
  return normalized;
}

function canonicalizeFundName(name) {
  let value = String(name || '').toLowerCase().trim();
  const phraseReplacements = [
    ['aditya birla sun life', 'birlasunlife'],
    ['birla sun life', 'birlasunlife'],
    ['axis bank', 'axis'],
    ['motital', 'motilal'],
    ['technology opportunities', 'technology'],
    ['banking and financial services', 'banking financial service'],
    ['banking & fin svcs', 'banking financial services'],
    ['banking & financial svcs', 'banking financial services'],
    ['financial services', 'financial service'],
    ['fin services', 'financial service'],
    ['fin svcs', 'financial service'],
    ['financial svcs', 'financial service'],
    ['liquidity', 'liquid'],
    ['mid-cap', 'mid cap'],
    ['large-cap', 'large cap'],
    ['small-cap', 'small cap'],
    ['mahindra', ''],
    ['opportunities', ''],
    ['opp', ''],
    ['&', ' and '],
    ['*', ' ']
  ];
  phraseReplacements.forEach(([from, to]) => { value = value.replaceAll(from, to); });
  value = value.replace(/[^a-z0-9]+/g, ' ');

  const tokenMap = {
    dir: 'direct',
    gr: 'growth',
    fin: 'financial',
    serv: 'service',
    services: 'service',
    svcs: 'service',
    svc: 'service'
  };
  const stopwords = new Set([
    'fund', 'funds', 'direct', 'growth', 'plan', 'option', 'regular',
    'and', 'of', 'the', 'g'
  ]);

  const tokens = value.split(/\s+/)
    .map(token => tokenMap[token] || token)
    .filter(token => token && !stopwords.has(token));

  return [...new Set(tokens)].sort().join(' ');
}

function buildFundNameLookup(names) {
  const lookup = new Map();
  names.forEach(name => lookup.set(canonicalizeFundName(name), name));
  return lookup;
}

function buildCaseInsensitiveLookup(names) {
  const lookup = new Map();
  names.forEach(name => lookup.set(String(name || '').trim().toLowerCase(), name));
  return lookup;
}

function tokenSimilarity(a, b) {
  const aTokens = new Set(a.split(' ').filter(Boolean));
  const bTokens = new Set(b.split(' ').filter(Boolean));
  if (!aTokens.size || !bTokens.size) return 0;
  const overlap = [...aTokens].filter(token => bTokens.has(token)).length;
  return overlap / new Set([...aTokens, ...bTokens]).size;
}

function findFundMatch(name, lookup, candidates) {
  const raw = String(name || '').trim();
  if (!raw) return null;

  if (candidates.includes(raw)) return raw;

  const lowerLookup = buildCaseInsensitiveLookup(candidates);
  if (lowerLookup.has(raw.toLowerCase())) return lowerLookup.get(raw.toLowerCase());

  const canonical = canonicalizeFundName(raw);
  if (lookup.has(canonical)) return lookup.get(canonical);

  let bestName = null;
  let bestScore = 0;
  candidates.forEach(candidate => {
    const score = tokenSimilarity(canonical, canonicalizeFundName(candidate));
    if (score > bestScore) {
      bestScore = score;
      bestName = candidate;
    }
  });

  return bestScore >= 0.72 ? bestName : null;
}

function normalizeRiskPeriod(period) {
  return String(period || '').trim().replace(/\s+/g, ' ').toUpperCase();
}

function getPreferredRiskPeriod() {
  if (DB.riskPeriods.includes('5 YR')) return '5 YR';
  if (DB.riskPeriods.includes('3Y')) return '3Y';
  if (DB.riskPeriods.includes('MONTHLY')) return 'MONTHLY';
  return DB.riskPeriods[0] || null;
}

function getSheetByHeaders(wb, requiredHeaders) {
  for (const sheetName of wb.SheetNames) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { raw: false });
    if (!rows.length) continue;
    const headers = Object.keys(normalizeRow(rows[0]));
    const hasAll = requiredHeaders.every(h => headers.includes(h));
    if (hasAll) return { sheetName, rows };
  }
  return null;
}

function parseWorkbook(wb) {
  const prevFunds = new Set(selectedFunds);
  const prevIndices = new Set(selectedIndices);
  DB = { funds: {}, indices: {}, riskFree: {}, meta: {}, riskPeriods: [] };

  // Sheet with NAV data — columns: Date, FundName, Category, NAV
  const navSheet = getSheetByHeaders(wb, ['Date', 'FundName', 'Category', 'NAV']);
  if (navSheet) {
    navSheet.rows.forEach(rawRow => {
      const r = normalizeRow(rawRow);
      const name = r['FundName'], cat = r['Category'], nav = parseFloat(r['NAV']), date = r['Date'];
      if (!name || isNaN(nav) || !date) return;
      if (!DB.funds[name]) DB.funds[name] = { category: cat, nav: [] };
      DB.funds[name].nav.push({ date: new Date(date), value: nav });
    });
    Object.values(DB.funds).forEach(f => f.nav.sort((a,b) => a.date - b.date));
  }

  // Sheet: Index_Data — columns: Date, IndexName, Value
  if (wb.SheetNames.includes('Index_Data')) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets['Index_Data'], { raw: false });
    rows.forEach(rawRow => {
      const r = normalizeRow(rawRow);
      const name = r['IndexName'], val = parseFloat(r['Value']), date = r['Date'];
      if (!name || isNaN(val) || !date) return;
      if (!DB.indices[name]) DB.indices[name] = [];
      DB.indices[name].push({ date: new Date(date), value: val });
    });
    Object.values(DB.indices).forEach(arr => arr.sort((a,b) => a.date - b.date));
  }

  // Sheet: RiskFree — columns: Date, Rate
  if (wb.SheetNames.includes('RiskFree')) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets['RiskFree'], { raw: false });
    rows.forEach(rawRow => {
      const r = normalizeRow(rawRow);
      const rate = parseFloat(r['Rate'] ?? r['Value']), date = r['Date'];
      if (isNaN(rate) || !date) return;
      DB.riskFree[String(r['Date']).trim()] = rate;
    });
  }

  // Sheet: RiskMetrics — workbook-specific columns: FundName, Period, Alpha, Beta, Benchmark, R2
  if (wb.SheetNames.includes('RiskMetrics')) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets['RiskMetrics'], { raw: false });
    const fundNames = Object.keys(DB.funds);
    const fundLookup = buildFundNameLookup(fundNames);
    const periods = new Set();

    rows.forEach(rawRow => {
      const r = normalizeRow(rawRow);
      const sourceName = r['FundName'];
      const matchedName = findFundMatch(sourceName, fundLookup, fundNames);
      if (!matchedName) return;
      if (!DB.meta[matchedName]) DB.meta[matchedName] = {};

      const period = normalizeRiskPeriod(r['Period'] || 'MONTHLY');
      periods.add(period);
      DB.meta[matchedName][period] = {
        alpha: parseFloat(r['Alpha']),
        beta: parseFloat(r['Beta']),
        r2: parseFloat(r['R2']),
        benchmark: r['Benchmark'],
        sourceFundName: sourceName
      };
    });

    DB.riskPeriods = [...periods];
  }

  selectedFunds = new Set([...prevFunds].filter(name => DB.funds[name]));
  selectedIndices = new Set([...prevIndices].filter(name => DB.indices[name]));
  riskPeriod = DB.riskPeriods.includes(riskPeriod) ? riskPeriod : getPreferredRiskPeriod();
  assignColors();
  renderSidebar();
  renderDashboard();

  const n = Object.keys(DB.funds).length;
  document.getElementById('data-status').textContent = `${n} funds loaded`;
}

function assignColors() {
  let i = 0;
  Object.keys(DB.funds).forEach(name => { fundColorMap[name] = COLORS[i++ % COLORS.length]; });
  Object.keys(DB.indices).forEach(name => { fundColorMap[name] = COLORS[i++ % COLORS.length]; });
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  // Funds grouped by category
  const cats = {};
  Object.entries(DB.funds).forEach(([name, f]) => {
    const c = f.category || 'Other';
    if (!cats[c]) cats[c] = [];
    cats[c].push(name);
  });

  const fl = document.getElementById('fund-list');
  fl.innerHTML = '';
  Object.entries(cats).forEach(([cat, funds]) => {
    const grp = document.createElement('div');
    grp.className = 'category-group';
    const lbl = document.createElement('div');
    lbl.className = 'category-label open';
    lbl.innerHTML = `<span>${cat}</span><span class="chevron">›</span>`;
    lbl.onclick = () => {
      lbl.classList.toggle('open');
      list.classList.toggle('open');
      activeCategory = cat;
    };
    const list = document.createElement('div');
    list.className = 'fund-list open';
    funds.forEach(name => {
      const item = document.createElement('div');
      item.className = 'fund-item' + (selectedFunds.has(name) ? ' selected' : '');
      item.dataset.name = name;
      item.innerHTML = `<input type="checkbox" ${selectedFunds.has(name)?'checked':''} />
        <span class="fund-color-dot" style="background:${fundColorMap[name]}"></span>
        <span>${name}</span>`;
      item.onclick = () => toggleFund(name, item);
      list.appendChild(item);
    });
    grp.append(lbl, list);
    fl.appendChild(grp);
    activeCategory = Object.keys(cats)[0];
  });

  // Indices
  const il = document.getElementById('index-list');
  il.innerHTML = '';
  Object.keys(DB.indices).forEach(name => {
    const item = document.createElement('div');
    item.className = 'index-item' + (selectedIndices.has(name) ? ' selected' : '');
    item.dataset.name = name;
    item.innerHTML = `<input type="checkbox" ${selectedIndices.has(name)?'checked':''} />
      <span class="fund-color-dot" style="background:${fundColorMap[name]}"></span>
      <span>${name}</span>`;
    item.onclick = () => toggleIndex(name, item);
    il.appendChild(item);
  });
  if (!Object.keys(DB.indices).length) {
    il.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px;">No index data found</div>';
  }
}

function toggleFund(name, el) {
  if (selectedFunds.has(name)) { selectedFunds.delete(name); el.classList.remove('selected'); }
  else { selectedFunds.add(name); el.classList.add('selected'); }
  el.querySelector('input').checked = selectedFunds.has(name);
  renderDashboard();
}
function toggleIndex(name, el) {
  if (selectedIndices.has(name)) { selectedIndices.delete(name); el.classList.remove('selected'); }
  else { selectedIndices.add(name); el.classList.add('selected'); }
  el.querySelector('input').checked = selectedIndices.has(name);
  renderDashboard();
}
function selectAll() {
  Object.keys(DB.funds).forEach(n => selectedFunds.add(n));
  Object.keys(DB.indices).forEach(n => selectedIndices.add(n));
  renderSidebar(); renderDashboard();
}
function clearAll() {
  selectedFunds.clear(); selectedIndices.clear();
  renderSidebar(); renderDashboard();
}
function selectCategory(cat) {
  if (!cat) return;
  selectedFunds.clear();
  Object.entries(DB.funds).forEach(([n, f]) => { if (f.category === cat) selectedFunds.add(n); });
  renderSidebar(); renderDashboard();
}

function getDateRange() {
  const from = document.getElementById('range-from')?.value;
  const to = document.getElementById('range-to')?.value;
  return {
    from: from ? new Date(from) : null,
    to: to ? new Date(to) : null
  };
}

function filterByDateRange(arr) {
  const { from, to } = getDateRange();
  return arr.filter(p => (!from || p.date >= from) && (!to || p.date <= to));
}

let navMode = 'indexed';
function setNavMode(mode, btn) {
  navMode = mode;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (chartInstances['navChart']) { chartInstances['navChart'].destroy(); delete chartInstances['navChart']; }
  buildNavChart(mode);

function buildNavChart(mode) {
  const allSeries = getSelectedSeries();
  if (!allSeries.length) return;

  const datasets = allSeries.map(({ name, points, color }) => {
    let data;
    if (mode === 'indexed') {
      const base = points[0]?.value || 1;
      data = points.map(p => ({ x: p.date, y: +(p.value / base * 100).toFixed(2) }));
    } else if (mode === 'absolute') {
      data = points.map(p => ({ x: p.date, y: +p.value.toFixed(2) }));
    } else {
      const base = points[0]?.value || 1;
      data = points.map(p => ({ x: p.date, y: +(((p.value - base) / base) * 100).toFixed(2) }));
    }
    return {
      label: name,
      data,
      borderColor: color,
      backgroundColor: color + '22',
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.3,
      fill: false
    };
  });

  const ctx = document.getElementById('navChart');
  chartInstances['navChart'] = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: {
        callbacks: {
          label: ctx => {
            const v = ctx.parsed.y;
            if (mode === 'indexed') return `${ctx.dataset.label}: ${v.toFixed(1)}`;
            if (mode === 'returns') return `${ctx.dataset.label}: ${v.toFixed(2)}%`;
            return `${ctx.dataset.label}: ₹${v.toFixed(2)}`;
          }
        }
      }},
      scales: {
        x: { type: 'time', time: { unit: 'month', displayFormats: { month: 'MMM yy' } },
          ticks: { color: '#7a7f94', maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#7a7f94' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });

  buildLegend('nav-legend', allSeries);
}

function buildRollingChart() {
  const allSeries = getSelectedSeries();
  const datasets = allSeries.map(({ name, points, color }) => {
    const data = [];
    for (let i = 12; i < points.length; i++) {
      const base = points[i-12].value, cur = points[i].value;
      data.push({ x: points[i].date, y: +(((cur - base)/base)*100).toFixed(2) });
    }
    return { label: name, data, borderColor: color, borderWidth: 2, pointRadius: 0, tension: 0.3, fill: false };
  });

  const ctx = document.getElementById('rollingChart');
  chartInstances['rollingChart'] = new Chart(ctx, {
    type: 'line', data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: { type: 'time', time: { unit: 'month', displayFormats: { month: 'MMM yy' } },
          ticks: { color: '#7a7f94', maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#7a7f94', callback: v => v+'%' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
  buildLegend('rolling-legend', allSeries);
}

function buildCAGRChart() {
  const periods = ['1Y', '3Y', '5Y'];
  const allSeries = getSelectedSeries();
  const labels = periods;
  const datasets = allSeries.map(({ name, points, color }) => {
    const data = periods.map(p => {
      const months = p === '1Y' ? 12 : p === '3Y' ? 36 : 60;
      if (points.length < months+1) return null;
      const base = points[points.length - months - 1].value;
      const end = points[points.length - 1].value;
      const years = months / 12;
      return +((Math.pow(end/base, 1/years) - 1) * 100).toFixed(2);
    });
    return { label: name, data, backgroundColor: color+'bb', borderColor: color, borderWidth: 1, borderRadius: 4 };
  });

  chartInstances['cagrChart'] = new Chart(document.getElementById('cagrChart'), {
    type: 'bar', data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7a7f94' }, grid: { display: false } },
        y: { ticks: { color: '#7a7f94', callback: v => v+'%' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
  buildLegend('cagr-legend', allSeries);
}

function showHistogram(name, btn) {
  document.querySelectorAll('#view-content .histogram-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const fund = DB.funds[name] || DB.indices[name];
  if (!fund) return;
  const pts = filterByDateRange(fund.nav || fund);
  const monthlyReturns = calcMonthlyReturnSeries(pts).map(p => p.y);
  if (!monthlyReturns.length) return;

  const min = Math.floor(Math.min(...monthlyReturns)), max = Math.ceil(Math.max(...monthlyReturns));
  const buckets = 20, step = (max - min || 1) / buckets;
  const counts = Array(buckets).fill(0);
  monthlyReturns.forEach(r => {
    const idx = Math.min(Math.floor((r - min) / step), buckets - 1);
    counts[idx]++;
  });
  const labels = Array.from({length: buckets}, (_,i) => (min + i*step).toFixed(1)+'%');

  if (chartInstances['histChart']) { chartInstances['histChart'].destroy(); delete chartInstances['histChart']; }
  const color = fundColorMap[name] || COLORS[0];
  chartInstances['histChart'] = new Chart(document.getElementById('histChart'), {
    type: 'bar', data: { labels, datasets: [{ label: name, data: counts, backgroundColor: color+'aa', borderColor: color, borderWidth: 1 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7a7f94', maxTicksLimit: 10 }, grid: { display: false } },
        y: { ticks: { color: '#7a7f94' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function buildDrawdownChart() {
  const allSeries = getSelectedSeries();
  const datasets = allSeries.map(({ name, points, color }) => {
    let peak = -Infinity, data = [];
    points.forEach(p => {
      if (p.value > peak) peak = p.value;
      data.push({ x: p.date, y: +(((p.value - peak)/peak)*100).toFixed(2) });
    });
    return { label: name, data, borderColor: color, borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: { target: 'origin', above: color+'22' } };
  });

  chartInstances['drawdownChart'] = new Chart(document.getElementById('drawdownChart'), {
    type: 'line', data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: { type: 'time', time: { unit: 'month', displayFormats: { month: 'MMM yy' } }, ticks: { color: '#7a7f94', maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#7a7f94', callback: v => v+'%' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
  buildLegend('dd-legend', allSeries);
}

// ── Table View ────────────────────────────────────────────────────────────────
function renderTableView() {
  const vc = document.getElementById('view-content');
  const fundsArr = [...selectedFunds];
  const summaryRiskPeriod = getPreferredRiskPeriod();

  const rows = fundsArr.map(name => {
    const f = DB.funds[name];
    const pts = f ? filterByDateRange(f.nav) : [];
    const latest = pts.at(-1)?.value || null;
    const meta = summaryRiskPeriod ? DB.meta[name]?.[summaryRiskPeriod] : null;
    const cagr1 = calcCAGR(pts, 12), cagr3 = calcCAGR(pts, 36), cagr5 = calcCAGR(pts, 60);
    return { name, category: f?.category || '—', latest, cagr1, cagr3, cagr5,
      alpha: meta?.alpha, beta: meta?.beta, r2: meta?.r2 };
  });

  vc.innerHTML = `
    <div class="chart-card">
      <h3>Fund Metrics Summary</h3>
      <p class="chart-sub">All metrics for selected funds${summaryRiskPeriod ? ` — Alpha/Beta/R2 based on ${summaryRiskPeriod} risk metrics` : ''}</p>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Fund</th><th>Category</th><th>Latest NAV</th>
            <th>1Y CAGR</th><th>3Y CAGR</th><th>5Y CAGR</th>
            <th>Alpha${summaryRiskPeriod ? ` (${summaryRiskPeriod})` : ''}</th><th>Beta${summaryRiskPeriod ? ` (${summaryRiskPeriod})` : ''}</th><th>R2${summaryRiskPeriod ? ` (${summaryRiskPeriod})` : ''}</th>
          </tr></thead>
          <tbody>
          ${rows.map(r => `<tr>
            <td class="fund-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${fundColorMap[r.name]};margin-right:8px;"></span>${r.name}</td>
            <td>${r.category}</td>
            <td>₹${r.latest != null ? r.latest.toFixed(2) : '—'}</td>
            <td class="${pctClass(r.cagr1)}">${r.cagr1 != null ? r.cagr1.toFixed(2)+'%' : '—'}</td>
            <td class="${pctClass(r.cagr3)}">${r.cagr3 != null ? r.cagr3.toFixed(2)+'%' : '—'}</td>
            <td class="${pctClass(r.cagr5)}">${r.cagr5 != null ? r.cagr5.toFixed(2)+'%' : '—'}</td>
            <td class="${pctClass(r.alpha)}">${r.alpha != null ? r.alpha.toFixed(4) : '—'}</td>
            <td>${r.beta != null ? r.beta.toFixed(3) : '—'}</td>
            <td>${r.r2 != null ? r.r2.toFixed(3) : '—'}</td>
          </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function calcCAGR(pts, months) {
  if (!pts || pts.length < months+1) return null;
  const base = pts[pts.length - months - 1].value;
  const end = pts[pts.length - 1].value;
  return (Math.pow(end/base, 12/months) - 1) * 100;
}

function calcMonthlyReturnSeries(pts) {
  if (!pts || pts.length < 2) return [];
  const data = [];
  for (let i = 1; i < pts.length; i++) {
    const prev = pts[i - 1].value;
    const curr = pts[i].value;
    if (!curr) continue;
    data.push({
      x: pts[i].date,
      y: +(((curr - prev) / curr) * 100).toFixed(2)
    });
  }
  return data;
}

function pctClass(v) { if (v == null) return ''; return v >= 0 ? 'pos' : 'neg'; }

// ── Helpers ───────────────────────────────────────────────────────────────────
function getSelectedSeries() {
  const result = [];
  selectedFunds.forEach(name => {
    const f = DB.funds[name];
    if (!f) return;
    const pts = filterByDateRange(f.nav);
    if (pts.length > 0) result.push({ name, points: pts, color: fundColorMap[name] });
  });
  selectedIndices.forEach(name => {
    const arr = DB.indices[name];
    if (!arr) return;
    const pts = filterByDateRange(arr);
    if (pts.length > 0) result.push({ name, points: pts, color: fundColorMap[name] });
  });
  return result;
}

function buildSummaryStats() {
  const allSeries = getSelectedSeries();
  if (!allSeries.length) return [];
  const summaryRiskPeriod = getPreferredRiskPeriod();

  const avgBeta = summaryRiskPeriod ? [...selectedFunds].filter(n => DB.meta[n]?.[summaryRiskPeriod]?.beta != null)
    .map(n => DB.meta[n][summaryRiskPeriod].beta) : [];
  const avgBetaVal = avgBeta.length ? avgBeta.reduce((a,b)=>a+b,0)/avgBeta.length : null;

  const avgAlpha = summaryRiskPeriod ? [...selectedFunds].filter(n => DB.meta[n]?.[summaryRiskPeriod]?.alpha != null)
    .map(n => DB.meta[n][summaryRiskPeriod].alpha) : [];
  const avgAlphaVal = avgAlpha.length ? avgAlpha.reduce((a,b)=>a+b,0)/avgAlpha.length : null;

  return [
    { label: 'Funds Selected', value: selectedFunds.size + selectedIndices.size, sub: selectedFunds.size + ' funds, '+ selectedIndices.size +' indices', cls: '' },
    { label: `Avg Beta${summaryRiskPeriod ? ` (${summaryRiskPeriod})` : ''}`, value: avgBetaVal != null ? avgBetaVal.toFixed(2) : '—', sub: 'vs benchmark', cls: '' },
    { label: `Avg Alpha${summaryRiskPeriod ? ` (${summaryRiskPeriod})` : ''}`, value: avgAlphaVal != null ? (avgAlphaVal>=0?'+':'')+avgAlphaVal.toFixed(3) : '—', sub: 'excess return', cls: avgAlphaVal != null ? pctClass(avgAlphaVal) : '' },
  ];
}

function buildLegend(id, series) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = series.map(s => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${s.color}"></span>
      <span>${s.name || s}</span>
    </div>`).join('');
}

// ─── Toast ───────────────────────────────────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

// Load Chart.js date adapter
const s = document.createElement('script');
s.src = 'https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js';
s.onload = () => {
  dateAdapterReady = true;
  loadWorkbook(true);
  if (!refreshTimerId) refreshTimerId = setInterval(() => loadWorkbook(false), AUTO_REFRESH_MS);
};
s.onerror = () => {
  toast('Error loading date adapter', 'error');
  document.getElementById('data-status').textContent = 'Chart adapter unavailable';
};
document.head.appendChild(s);
</script>
</body>
